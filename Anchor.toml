[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
munity = "4PeTcJYm5rPj4AU3Lq72nhpbyUxny2vJDTW6XUdpDDpk"

[programs.devnet]
munity = "4PeTcJYm5rPj4AU3Lq72nhpbyUxny2vJDTW6XUdpDDpk"

[programs.mainnet]
munity = "4PeTcJYm5rPj4AU3Lq72nhpbyUxny2vJDTW6XUdpDDpk"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tests/solana/tsconfig.json -t 1000000 tests/solana/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false
