[toolchain]

[features]
resolution = true
skip-lint = false

[programs.mainnet]
munity = "34DuoQfRUGfLpWSsRapu1Fc3txeLfJr63pvYJJreXsHa"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false
